name: TIH Alert System

on:
  schedule:
    - cron: '* * * * *'
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  indices:
    runs-on: ubuntu-latest
    if: github.event.schedule == '* * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check Indices
        run: |
          curl -s "https://tih-trading-hub.vercel.app/api/alert-indices?action=check" \
            --max-time 30 || true

  stocks:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check Stocks
        run: |
          curl -s "https://tih-trading-hub.vercel.app/api/alert-stocks?action=check" \
            --max-time 50 || true
