name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_SnqLx0mdOVpdnUgjxnvebWIK7aoZ" \
          -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}"
